<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>萌乐多儿童乐园 - 会员端</title>
<style>
body{font-family:-apple-system,PingFang SC,Microsoft YaHei,sans-serif;background:#FFF5F5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{background:#fff;border-radius:24px;padding:40px;max-width:400px;width:90%;box-shadow:0 8px 32px rgba(255,107,129,.15);text-align:center}
h1{color:#FF6B81;font-size:20px;margin:0 0 8px}
p{color:#999;font-size:14px}
.spinner{width:32px;height:32px;border:3px solid #FFE0E6;border-top-color:#FF6B81;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#E8456A;font-size:13px;display:none}
</style>
</head>
<body>
<div class="card">
  <h1>萌乐多儿童乐园</h1>
  <p>正在跳转到会员端...</p>
  <div class="spinner"></div>
  <div class="error" id="err"></div>
</div>
<script>
fetch("config.json").then(r=>r.json()).then(c=>{
  var url=c.member||(c.baseUrl?c.baseUrl+"/member.html":null);
  if(url)window.location.replace(url);
  else throw new Error("配置中没有会员端地址");
}).catch(e=>{
  document.getElementById("err").style.display="block";
  document.getElementById("err").textContent="跳转失败: "+e.message;
  document.querySelector(".spinner").style.display="none";
});
</script>
</body>
</html>
